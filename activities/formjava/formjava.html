<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="formjava.css">
</head>
<body>
    <header>
        <h1>Web Design</h1>
    </header>
    <main>
        <form action="formprocs.html" method="get" id="myForm">
            <fieldset>
                <legend>Account Info</legend>
                <div class="form-row">
                    <label for="fullname">Full Name: </label>
                    <input type="text" name="fullname" id="fullname" placeholder="Bryanna Lautaimi" required>
                </div>
                <div class="form-row">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" value="blautaimi@byuh.edu">
                </div>
                <div class="form-row">
                    <label for="password">Password: </label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="form-row">
                    <label for="age">Age: </label>
                    <input type="number" name="age" id="age">
                </div>
                <div class="form-row">
                    <label for="state">State: </label>
                    <select name="state" id="state">
                        <option value="blank">----</option>
                        <option value="HI">Hawaii</option>
                        <option value="CA">California</option>
                        <option value="UT">Utah</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="comments">Comments: </label>
                    <textarea name="comments" id="comments"></textarea>
                </div>
                <div class="check-row">
                    <div class="spacer">Year in School: </div>
                    <label><input type="radio" name="year" id="freshman">Freshman</label>
                    <label><input type="radio" name="year" id="sophomore">Sophomore</label>
                </div>
                <div class="check-row">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="remember">Remember Me</label>
                </div>
                <div class="form-row">
                    <div class="spacer"></div>
                    <input type="submit" value="Submit">
                </div>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; Bryanna Lautaimi, 2026</p>
    </footer>
    <script>
        document.getElementById('myForm').addEventListener('submit', function(event) {
            event.preventDefault();
            //alert('Form Submitted');

            const fullame = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const age = document.getElementById('age').value;

            if (!fullname || !email) {
                alert("You need a name and email.");
                return;
            }
            
            if (!age || age < 18) {
                alert("You need to be 18")
            }

            const formData = {
                name: fullname,
                email: email,
                password: password,
                age: age
            };

            console.log(formData);
        })
    </script>
</body>
</html>

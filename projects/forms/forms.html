<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="forms.css">
</head>
<body>
    <header>
        <h1>Sign Up Form</h1>
    </header>
    <main>
        <form action="formprocs.html" method="post">
            <fieldset>
                <legend>Sign Up!</legend>
                <div class="form-row">
                    <label for="fname">Name: </label>
                    <input type="text" name="fullname" id="fname" placeholder="Bryanna Lautaimi" required>
                </div>
                <div class="form-row">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" placeholder>
                </div>
                <div class="form-row">
                    <label for="password">Password: </label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="form-row">
                    <label for="birthday">Birthdate: </label>
                    <input type="date" name="birthdate" id="birthdate">
                </div>
                <div class="form-row">
                    <label for="phone">Phone Number: </label>
                    <input type="tel" name="phone" id="phone">
                </div>
                <div class="form-row">
                    <label for="state">State: </label>
                    <select name="state" id="state">
                        <option value="blank">----</option>
                        <option value="HI">Hawaii</option>
                        <option value="CA">California</option>
                        <option value="UT">Utah</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="comments">Comments: </label>
                    <textarea name="comments" id="comments"></textarea>
                </div>
                <div class="check-row">
                    <div class="spacer">Gender: </div>
                    <label><input type="radio" name="gender" id="male">Male</label>
                    <label><input type="radio" name="gender" id="female">Female</label>
                </div>
                <div class="check-row">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="remember">I have agreed to the terms.</label>
                </div>
                <div class="form-row">
                    <div class="spacer"></div>
                    <input type="submit" value="Sign Up!">
                </div>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; Bryanna Lautaimi, 2026</p>
    </footer>
</body>
</html>
